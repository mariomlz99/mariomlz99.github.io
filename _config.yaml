title: Mario Malizia
first_name: Mario
last_name: Malizia
description: > 
  Research Engineer at the Royal Military Academy of Belgium & PhD Candidate at KU Leuven.
lang: en 
icon: mario_lidar.jpg 
url: https://mariomlz99.github.io
baseurl:

remote_theme: alshedivat/al-folio
include: ["_pages"]

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------
navbar_fixed: false
navbar_hide_title: true   
header_pages: []          
footer_fixed: false
max_width: 800px 

# -----------------------------------------------------------------------------
# Profilo
# -----------------------------------------------------------------------------
profile:
  align: right
  image: mario_auh.jpg
  image_circular: true 

# -----------------------------------------------------------------------------
# Pubblicazioni
# -----------------------------------------------------------------------------
enable_publication_thumbnails: true

# Questi badge restano disponibili anche con le pubblicazioni gestite manualmente
display_publications_badges:
  "ICCAS": "primary"
  "IEEE RA-L": "success"
  "Oral": "warning"

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
plugins:
  - jekyll-3rd-party-libraries
  - jekyll-archives-v2
  - jekyll-cache-bust
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-remote-theme
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Social (Svuotato perché gestito manualmente in about.md)
# -----------------------------------------------------------------------------
social:
  # Gestiti in about.md per un look più pulito accanto al nome
